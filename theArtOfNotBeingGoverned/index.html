<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逃避统治的艺术 - 读书卡片集</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <img src="cover.jpg" alt="书影" class="book-cover">
            <div class="header-text">
                <h1>《逃避统治的艺术》</h1>
                <p class="subtitle">东南亚高地无政府主义史 - 读书卡片全集</p>
            </div>
        </div>
    </header>

    <nav id="filters">
        <div class="filter-group">
            <span class="filter-label">视图维度：</span>
            <button class="filter-btn active" data-type="chapter">按章节</button>
            <button class="filter-btn" data-type="theme">按主题</button>
            <button class="filter-btn" data-type="random">自由观点</button>
        </div>
        <div id="sub-filters" class="filter-options">
            <!-- 动态生成按钮 -->
        </div>
    </nav>

    <main id="card-container">
        <!-- 动态生成卡片 -->
    </main>

    <footer>
        <p>© 2026 基于詹姆斯·斯科特著作整理</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
